services:

  postgres:
    image: postgres:15
    container_name: learnhub_postgres
    env_file:
      - backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: learnhub_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build: .
    container_name: learnhub_app
    env_file:
      - backend/.env
    ports:
      - "8010:8010"
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
    volumes:
      - ./backend:/app

  celery_worker:
    build: .
    container_name: learnhub_celery_worker
    command: celery -A conf worker -l info
    env_file:
      - backend/.env
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
    volumes:
      - ./backend:/app

  celery_beat:
    build: .
    container_name: learnhub_celery_beat
    command: celery -A conf beat -l info
    env_file:
      - backend/.env
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
  redis_data:

